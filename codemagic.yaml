workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 120
    environment:
      vars:
        BUILD_NUMBER: 1.0.$BUILD_NUMBER
        CORDOVA_PATH: ios-app
      node: 20.11.0
      cocoapods: default
    scripts:
      - name: Show environment info
        script: |
          node --version
          npm --version
          xcodebuild -version
          pod --version
      
      - name: Install npm dependencies
        script: cd $CORDOVA_PATH && npm install
      
      - name: Install Cordova CLI
        script: npm install -g cordova@12.0.0
      
      - name: Add iOS platform
        script: |
          cd $CORDOVA_PATH
          cordova platform remove ios || true
          cordova platform add ios@7.0.1
      
      - name: Build iOS Debug for Simulator
        script: |
          cd $CORDOVA_PATH
          cordova build ios --debug --emulator
      
      - name: Build iOS Release for Simulator
        script: |
          cd $CORDOVA_PATH
          cordova build ios --release --emulator
    artifacts:
      - ios-app/platforms/ios/build/emulator/*.app