workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 120
    environment:
      vars:
        BUILD_NUMBER: 1.0.$BUILD_NUMBER
        CORDOVA_PATH: ios-app
        TEAM_ID: $TEAM_ID
        PROVISIONING_PROFILE_ID: $PROVISIONING_PROFILE_ID
        CERTIFICATE_ID: $CERTIFICATE_ID
      node: 20.11.0
      cocoapods: default
    scripts:
      - name: Show environment info
        script: |
          node --version
          npm --version
          xcodebuild -version
          pod --version
      
      - name: Install npm dependencies
        script: cd $CORDOVA_PATH && npm install
      
      - name: Install Cordova CLI
        script: npm install -g cordova@12.0.0
      
      - name: Add iOS platform
        script: |
          cd $CORDOVA_PATH
          cordova platform remove ios || true
          cordova platform add ios@7.0.1
      
      - name: Build iOS Debug for Simulator
        script: |
          cd $CORDOVA_PATH
          cordova build ios --debug --emulator
      
      - name: Create build.json for signing
        script: |
          cd $CORDOVA_PATH
          cat > build.json << 'EOF'
{
  "ios": {
    "debug": {
      "codeSignIdentity": "iPhone Developer",
      "provisioningProfile": "$PROVISIONING_PROFILE_ID",
      "developmentTeam": "$TEAM_ID",
      "packageType": "development"
    },
    "release": {
      "codeSignIdentity": "iPhone Distribution",
      "provisioningProfile": "$PROVISIONING_PROFILE_ID",
      "developmentTeam": "$TEAM_ID",
      "packageType": "ad-hoc"
    }
  }
}
EOF
      
      - name: Build iOS Release for Device
        script: |
          cd $CORDOVA_PATH
          cordova build ios --release --device --buildConfig=build.json
      
      - name: Export IPA
        script: |
          cd $CORDOVA_PATH
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath platforms/ios/build/device/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>ad-hoc</string>
    <key>teamID</key>
    <string>$TEAM_ID</string>
    <key>signingStyle</key>
    <string>manual</string>
    <key>provisioningProfiles</key>
    <dict>
        <key>com.longevity.game</key>
        <string>$PROVISIONING_PROFILE_ID</string>
    </dict>
</dict>
</plist>
EOF
    artifacts:
      - ios-app/platforms/ios/build/emulator/*.app
      - ios-app/build/ipa/*.ipa