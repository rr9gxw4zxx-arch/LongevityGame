workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 120
    environment:
      vars:
        BUILD_NUMBER: 1.0.$BUILD_NUMBER
        CORDOVA_PATH: ios-app
      node: 20.11.0
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: cd $CORDOVA_PATH && npm install
      
      - name: Install Cordova CLI
        script: npm install -g cordova
      
      - name: Add iOS platform
        script: cd $CORDOVA_PATH && cordova platform add ios || true
      
      - name: Install iOS dependencies
        script: cd $CORDOVA_PATH/platforms/ios && pod install
      
      - name: Build iOS Debug for Simulator
        script: cd $CORDOVA_PATH && cordova build ios --debug --emulator
      
      - name: Build iOS Release for Device
        script: cd $CORDOVA_PATH && cordova build ios --release --device
    artifacts:
      - ios-app/platforms/ios/build/device/*.app
      - ios-app/platforms/ios/build/emulator/*.app