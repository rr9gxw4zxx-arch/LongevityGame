<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>洪荒长生 - 李长寿传</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #0a0a0a;
            -webkit-overflow-scrolling: touch;
            touch-action: none;
        }
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        #gameUI { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
        }
        .ui-layer { position: absolute; width: 100%; height: 100%; }
        #touchControls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
        }
        #actionButtons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
        }
        .actionBtn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.8);
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .actionBtn:active {
            transform: scale(0.95);
            background: rgba(255, 215, 0, 1);
        }
        #attackBtn {
            background: rgba(255, 69, 0, 0.8);
            border-color: #ff4500;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="gameUI">
        <div class="ui-layer" id="hudLayer"></div>
        <div class="ui-layer" id="menuLayer"></div>
        <div class="ui-layer" id="dialogLayer"></div>
        <div class="ui-layer" id="loadingLayer"></div>
    </div>
    
    <div id="touchControls">
        <canvas id="joystick" width="120" height="120"></canvas>
    </div>
    
    <div id="actionButtons">
        <div class="actionBtn" id="skillBtn1" data-skill="qingping">⚔️</div>
        <div class="actionBtn" id="skillBtn2" data-skill="taiji">☯️</div>
        <div class="actionBtn" id="interactBtn">💬</div>
        <div class="actionBtn" id="attackBtn">⚔️</div>
    </div>
    
    <script src="cordova.js"></script>
    <script type="module" src="src/game/Main.js"></script>
</body>
</html>
