format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

app:
  envs:
    - BITRISE_PROJECT_PATH: "Cordova/platforms/ios/App.xcworkspace"
    - BITRISE_SCHEME: "App"
    - BITRISE_EXPORT_METHOD: "development"
    - BITRISE_IOS_CODE_SIGN_IDENTITY: "iPhone Developer"
    - UE5_PROJECT_PATH: "$BITRISE_SOURCE_DIR/UE5Project/LongevityUE5.uproject"
    - UE5_PLATFORM: "IOS"
    - UE5_CONFIG: "Development"

workflows:
  primary:
    steps:
      - activate-ssh-key@4:
          run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
      
      - git-clone@6: {}
      
      - cache-pull@2: {}
      
      - npm@1:
          inputs:
            - command: "install"
            - cwd: "ios-app"
      
      - script@1:
          inputs:
            - content: |
                # 检查UE5是否可用
                if [ -d "/Users/vagrant/Epic Games/UE_5.4" ]; then
                  UE5_PATH="/Users/vagrant/Epic Games/UE_5.4"
                  echo "UE5 found at: $UE5_PATH"
                  
                  # 构建UE5项目
                  echo "=== 开始构建UE5项目 ==="
                  "$UE5_PATH/Engine/Binaries/Mac/UnrealEditor" \
                    "$UE5_PROJECT_PATH" \
                    -run=cook -targetplatform=$UE5_PLATFORM \
                    -cookall -mapsonly -skipeditorcontent \
                    -compress -multiprocess \
                    -NoP4 -NoHotReload \
                    -log="ue5-build.log"
                  
                  # 打包UE5
                  "$UE5_PATH/Engine/Binaries/Mac/UnrealEditor" \
                    "$UE5_PROJECT_PATH" \
                    -run=BuildCookRun \
                    -project="$UE5_PROJECT_PATH" \
                    -noP4 \
                    -platform=$UE5_PLATFORM \
                    -config=$UE5_CONFIG \
                    -cook \
                    -build \
                    -stage \
                    -pak \
                    -archive \
                    -archivedirectory="Build/UE5" \
                    -log="ue5-package.log"
                  
                  # 同步资源到Cordova
                  mkdir -p "ios-app/platforms/ios/App/Assets/UE5"
                  cp -r "Build/UE5/Payload/LongevityUE5.app" "ios-app/platforms/ios/App/Assets/UE5/" 2>/dev/null || true
                else
                  echo "=== UE5未安装，使用预构建资源 ==="
                  if [ -d "Build/UE5" ]; then
                    mkdir -p "ios-app/platforms/ios/App/Assets/UE5"
                    cp -r "Build/UE5/"* "ios-app/platforms/ios/App/Assets/UE5/" 2>/dev/null || true
                  fi
                fi
      
      - cocoapods-install@2:
          inputs:
            - source: "https://cdn.cocoapods.org/"
            - verbose: "false"
            - cwd: "ios-app/platforms/ios"
      
      - xcode-build-for-test@1:
          inputs:
            - project_path: "$BITRISE_PROJECT_PATH"
            - scheme: "$BITRISE_SCHEME"
            - configuration: "Debug"
            - clean: "true"
      
      - xcode-archive@4:
          inputs:
            - project_path: "$BITRISE_PROJECT_PATH"
            - scheme: "$BITRISE_SCHEME"
            - configuration: "Release"
            - archive_path: "$BITRISE_DEPLOY_DIR/App.xcarchive"
            - export_options_plist_content: |
                <?xml version="1.0" encoding="UTF-8"?>
                <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                <plist version="1.0">
                <dict>
                    <key>method</key>
                    <string>$BITRISE_EXPORT_METHOD</string>
                    <key>teamID</key>
                    <string>$BITRISE_TEAM_ID</string>
                    <key>uploadBitcode</key>
                    <false/>
                    <key>compileBitcode</key>
                    <false/>
                </dict>
                </plist>
      
      - deploy-to-bitrise-io@2:
          inputs:
            - deploy_path: "$BITRISE_DEPLOY_DIR"
            - is_enable_public_page: "true"
      
      - cache-push@2: {}

  ue5-only:
    steps:
      - activate-ssh-key@4:
          run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
      
      - git-clone@6: {}
      
      - script@1:
          inputs:
            - content: |
                # UE5专属构建流程
                if [ -d "/Users/vagrant/Epic Games/UE_5.4" ]; then
                  UE5_PATH="/Users/vagrant/Epic Games/UE_5.4"
                  
                  "$UE5_PATH/Engine/Binaries/Mac/UnrealEditor" \
                    "$UE5_PROJECT_PATH" \
                    -run=BuildCookRun \
                    -project="$UE5_PROJECT_PATH" \
                    -noP4 \
                    -platform=IOS \
                    -config=Development \
                    -cook \
                    -build \
                    -stage \
                    -pak \
                    -archive \
                    -archivedirectory="Build/UE5"
                fi
      
      - deploy-to-bitrise-io@2:
          inputs:
            - deploy_path: "Build/UE5"

meta:
  bitrise.io:
    stack: osx-xcode-15.x
    machine_type_id: g2-m1-mac-12core